<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="login-body">
      <h2>Bejelentkezés</h2>

      <div class="login-inputs">
        <div>
          <label for="email">Email: </label>
          <input type="email" id="email" placeholder="Email" /><br />
        </div>
        <div>
          <label for="password">Jelszó: </label>
          <input type="password" id="password" placeholder="Jelszó" /><br />
        </div>
      </div>

      <button id="login-btn" onclick="login()">Belépés</button>
      <button id="register-btn" onclick="goToRegister()">Regisztráció</button>
    </div>

    <script>
      async function login() {
        const email = document.getElementById("email").value;

        const password = document.getElementById("password").value;

        const response = await fetch("http://localhost:3000/user/signin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();
        console.log(data);
        if (data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "chat.html";
        } else {
          alert("Hibás jelszó vagy felhasználónév");
        }
      }
      function goToRegister() {
        window.location.href = "register.html";
      }
    </script>
  </body>
</html>
