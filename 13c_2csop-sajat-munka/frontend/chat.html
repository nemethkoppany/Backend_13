<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Üzenetek</title>
  </head>
  <body>
    <div class="login-body">
      <h1>Üzenetek</h1>

      <ul id="messages"></ul>

      <input type="text" name="uzenet" id="uzenet" />
      <br>
      <br>

      <div>
        <button id="public-btn" onclick="sendBroadCast()">
          Publikus üzenet
        </button>
        <button id="private-btn" onclick="sendPrivateMessage()">
          Privát üzenet
        </button>
      </div>
    </div>

    <div id="room-panel">
      <h3>Chat szoba</h3>

      <input  type="number" id="roomIdInput" placeholder="Szoba ID" />
      <br>
      <br>

      <button id="chatroom-btn"  onclick="enterRoom()">Belépés a szobába</button>

    </div>

<script>
  let socket = null;
  const list = document.getElementById("messages");

  const token = localStorage.getItem("token");
  if (!token) {
    alert("Hibás vagy nem létező token");
    window.location.href = "login.html";
  }

  function addMessage(text) {
    const li = document.createElement("li");
    li.textContent = text;
    list.appendChild(li);
  }

  async function loadMessages(roomId) {
    const res = await fetch(
      `http://localhost:3000/messages?roomId=${roomId}`,
      {
        headers: { "x-access-token": token },
      }
    );

    const messages = await res.json();
    list.innerHTML = "";

    messages.forEach((m) => {
      addMessage(`${m.senderEmail}: ${m.content}`);
    });
  }

  function enterRoom() {
    const roomId = document.getElementById("roomIdInput").value;
    if (!roomId) {
      alert("Add meg a szoba ID-t!");
      return;
    }
    startSocket(roomId);
  }


  function startSocket(roomId) {
    if (socket) {
      socket.close();
    }

    socket = new WebSocket(
      `ws://localhost:8080?token=${token}&roomId=${roomId}`
    );

    socket.onopen = () => {
      addMessage(`Beléptél a(z) ${roomId} szobába`);
      loadMessages(roomId);
    };

    socket.onmessage = (event) => {
      addMessage(event.data);
    };

    socket.onerror = () => {
      addMessage("Szerver hiba");
    };

    socket.onclose = () => {
      addMessage("A kapcsolat megszakadt");
    };
  }

  function sendBroadCast() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      alert("Nincs aktív kapcsolat!");
      return;
    }

    const message = document.getElementById("uzenet");
    socket.send(
      JSON.stringify({
        type: "broadcast",
        message: message.value,
      })
    );
    message.value = "";
  }

  function sendPrivateMessage() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      alert("Nincs aktív kapcsolat!");
      return;
    }

    const message = document.getElementById("uzenet");
    const toEmail = prompt("Adja meg a címzett email-jét:");
    if (!toEmail) return;

    socket.send(
      JSON.stringify({
        type: "private",
        toEmail: toEmail.trim().toLowerCase(),
        message: message.value,
      })
    );
    message.value = "";
  }
</script>
  </body>
</html>
